name: Deploy backend to Azure

on:
  push:
    branches: [main]
    paths:
      - 'policy-sim/api/**'
      - 'policy-sim/simulation/**'
      - 'policy-sim/data/**'
      - 'policy-sim/.claude/skills/**'
      - 'policy-sim/requirements.txt'
      - 'policy-sim/Dockerfile'
      - 'policy-sim/startup.sh'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry policysimacr \
            --image policy-sim:latest \
            --file policy-sim/Dockerfile \
            policy-sim/

      - name: Restart App Service to pull new image
        run: |
          az webapp restart \
            --name policy-sim \
            --resource-group policy-sim-rg
